<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 변경 — 직장인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#F8FAFC;color:#1E293B;min-height:100vh;display:flex;flex-direction:column;}

/* 헤더 */
header{background:#0B1120;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.06);}
.header-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:62px;gap:32px;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-text{font-family:'Noto Sans KR',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;display:flex;align-items:center;gap:1px;line-height:1;}
.logo-blue{color:#005BFF;}
.back-btn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;transition:color .15s;}
.back-btn:hover{color:#fff;}

/* 본문 */
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.card{background:#fff;border-radius:20px;border:1px solid #E2E8F0;padding:48px 40px;width:100%;max-width:460px;box-shadow:0 4px 24px rgba(0,0,0,.07);}
.card-title{font-size:22px;font-weight:900;color:#1E293B;letter-spacing:-.5px;margin-bottom:6px;}
.card-sub{font-size:14px;color:#94A3B8;margin-bottom:32px;line-height:1.6;}

.form-group{margin-bottom:20px;}
label{display:block;font-size:13px;font-weight:700;color:#475569;margin-bottom:7px;}
.input-wrap{position:relative;}
input[type="password"],input[type="text"]{width:100%;height:50px;border:1.5px solid #E2E8F0;border-radius:10px;padding:0 48px 0 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:#1E293B;outline:none;transition:border-color .15s;background:#fff;}
input:focus{border-color:#005BFF;}
input.error{border-color:#EF4444;}
input.success{border-color:#22C55E;}
.toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#94A3B8;padding:4px;}
.toggle-pw:hover{color:#475569;}

/* 유효성 안내 */
.field-msg{font-size:12px;margin-top:6px;display:none;}
.field-msg.show{display:block;}
.field-msg.error{color:#EF4444;}
.field-msg.success{color:#22C55E;}

/* 비밀번호 강도 */
.pw-strength{margin-top:8px;display:none;}
.pw-strength.show{display:block;}
.strength-bar{display:flex;gap:4px;margin-bottom:4px;}
.strength-bar span{flex:1;height:4px;border-radius:2px;background:#E2E8F0;transition:background .2s;}
.strength-bar span.active-weak{background:#EF4444;}
.strength-bar span.active-medium{background:#F59E0B;}
.strength-bar span.active-strong{background:#22C55E;}
.strength-label{font-size:12px;color:#94A3B8;}

.divider{height:1px;background:#F1F5F9;margin:28px 0;}

.submit-btn{width:100%;height:52px;background:#005BFF;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .15s;}
.submit-btn:hover{background:#0041CC;}
.submit-btn:disabled{background:#94A3B8;cursor:not-allowed;}

.result-msg{font-size:13px;margin-top:14px;text-align:center;display:none;padding:12px;border-radius:10px;}
.result-msg.show{display:block;}
.result-msg.success{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;}
.result-msg.error{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;}

.cancel-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:#94A3B8;text-decoration:none;}
.cancel-link:hover{color:#475569;}

  @media (max-width: 480px){
    .header-inner{ height:auto; min-height:56px; padding:10px 16px; flex-wrap:wrap; row-gap:6px; }
    .right-link, .back-btn, .back-link{ font-size:12px; margin-left:0; }
    .wrap{ padding:32px 16px; }
    .card{ padding:32px 20px; border-radius:16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">
      <span class="logo-text"><span class="logo-blue">직</span>장인</span>
    </a>
    <a href="mypage.html" class="back-btn">← 마이페이지로 돌아가기</a>
  </div>
</header>

<div class="wrap">
  <div class="card" id="main-card">
    <div class="card-title">비밀번호 변경</div>
    <div class="card-sub">현재 비밀번호를 확인한 후 새 비밀번호로 변경합니다.</div>

    <!-- 현재 비밀번호 -->
    <div class="form-group">
      <label>현재 비밀번호</label>
      <div class="input-wrap">
        <input type="password" id="current-pw" placeholder="현재 비밀번호 입력" oninput="clearMsg('current')">
        <button class="toggle-pw" type="button" onclick="togglePw('current-pw', this)">👁</button>
      </div>
      <div class="field-msg" id="current-msg"></div>
    </div>

    <div class="divider"></div>

    <!-- 새 비밀번호 -->
    <div class="form-group">
      <label>새 비밀번호</label>
      <div class="input-wrap">
        <input type="password" id="new-pw" placeholder="8자 이상 입력" oninput="checkStrength()">
        <button class="toggle-pw" type="button" onclick="togglePw('new-pw', this)">👁</button>
      </div>
      <!-- 강도 표시 -->
      <div class="pw-strength" id="pw-strength">
        <div class="strength-bar">
          <span id="s1"></span><span id="s2"></span><span id="s3"></span>
        </div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="field-msg" id="new-msg"></div>
    </div>

    <!-- 새 비밀번호 확인 -->
    <div class="form-group">
      <label>새 비밀번호 확인</label>
      <div class="input-wrap">
        <input type="password" id="confirm-pw" placeholder="새 비밀번호 다시 입력" oninput="checkConfirm()">
        <button class="toggle-pw" type="button" onclick="togglePw('confirm-pw', this)">👁</button>
      </div>
      <div class="field-msg" id="confirm-msg"></div>
    </div>

    <button class="submit-btn" id="change-btn" onclick="changePassword()">비밀번호 변경</button>
    <div class="result-msg" id="result-msg"></div>
    <a href="mypage.html" class="cancel-link">취소</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fgllsqgzgshneforfkoy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnbGxzcWd6Z3NobmVmb3Jma295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjU3NTMsImV4cCI6MjA5NTM0MTc1M30.aBaEUieQCiih3J0uv79TdhFU2cv2UWbeNZ7C9xvs54g';
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 로그인 여부 확인
var loggedIn = localStorage.getItem('jikjangin_logged_in');
if (!loggedIn) {
  window.location.href = 'login.html';
}

// 비밀번호 보기/숨기기
function togglePw(id, btn) {
  var input = document.getElementById(id);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

// 메시지 초기화
function clearMsg(field) {
  var el = document.getElementById(field + '-msg');
  if (el) { el.className = 'field-msg'; el.textContent = ''; }
  var input = document.getElementById(field === 'current' ? 'current-pw' : field + '-pw');
  if (input) { input.className = ''; }
}

// 비밀번호 강도 체크
function checkStrength() {
  var pw = document.getElementById('new-pw').value;
  var strengthEl = document.getElementById('pw-strength');
  var s1 = document.getElementById('s1');
  var s2 = document.getElementById('s2');
  var s3 = document.getElementById('s3');
  var label = document.getElementById('strength-label');

  if (pw.length === 0) { strengthEl.classList.remove('show'); return; }
  strengthEl.classList.add('show');

  var score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Za-z]/.test(pw) && /[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  s1.className = ''; s2.className = ''; s3.className = '';

  if (score === 1) {
    s1.className = 'active-weak';
    label.textContent = '취약한 비밀번호';
    label.style.color = '#EF4444';
  } else if (score === 2) {
    s1.className = 'active-medium'; s2.className = 'active-medium';
    label.textContent = '보통 비밀번호';
    label.style.color = '#F59E0B';
  } else if (score === 3) {
    s1.className = 'active-strong'; s2.className = 'active-strong'; s3.className = 'active-strong';
    label.textContent = '강한 비밀번호 👍';
    label.style.color = '#22C55E';
  }

  // 확인 필드 재검사
  if (document.getElementById('confirm-pw').value) checkConfirm();
}

// 비밀번호 확인 일치 체크
function checkConfirm() {
  var pw = document.getElementById('new-pw').value;
  var confirm = document.getElementById('confirm-pw').value;
  var msg = document.getElementById('confirm-msg');
  var input = document.getElementById('confirm-pw');

  if (!confirm) { msg.className = 'field-msg'; return; }

  if (pw === confirm) {
    input.className = 'success';
    msg.className = 'field-msg show success';
    msg.textContent = '✓ 비밀번호가 일치합니다.';
  } else {
    input.className = 'error';
    msg.className = 'field-msg show error';
    msg.textContent = '비밀번호가 일치하지 않습니다.';
  }
}

async function changePassword() {
  var currentPw = document.getElementById('current-pw').value;
  var newPw     = document.getElementById('new-pw').value;
  var confirmPw = document.getElementById('confirm-pw').value;
  var resultEl  = document.getElementById('result-msg');
  var btn       = document.getElementById('change-btn');

  // 유효성 검사
  if (!currentPw) {
    showFieldError('current', '현재 비밀번호를 입력해주세요.');
    return;
  }
  if (newPw.length < 8) {
    showFieldError('new', '새 비밀번호는 8자 이상이어야 합니다.');
    return;
  }
  if (newPw === currentPw) {
    showFieldError('new', '현재 비밀번호와 동일합니다. 다른 비밀번호를 입력해주세요.');
    return;
  }
  if (newPw !== confirmPw) {
    showFieldError('confirm', '비밀번호가 일치하지 않습니다.');
    return;
  }

  btn.disabled = true;
  btn.textContent = '변경 중...';
  resultEl.className = 'result-msg';

  // 현재 비밀번호 확인 (재로그인으로 검증)
  var userStr = localStorage.getItem('jikjangin_user');
  var user = userStr ? JSON.parse(userStr) : null;

  if (user && user.email) {
    var { error: signInError } = await sbClient.auth.signInWithPassword({
      email: user.email,
      password: currentPw
    });

    if (signInError) {
      btn.disabled = false;
      btn.textContent = '비밀번호 변경';
      showFieldError('current', '현재 비밀번호가 올바르지 않습니다.');
      document.getElementById('current-pw').className = 'error';
      return;
    }
  }

  // 새 비밀번호로 변경
  var { error } = await sbClient.auth.updateUser({ password: newPw });

  btn.disabled = false;
  btn.textContent = '비밀번호 변경';

  if (error) {
    resultEl.className = 'result-msg show error';
    resultEl.textContent = '오류가 발생했습니다. 다시 시도해주세요.';
  } else {
    resultEl.className = 'result-msg show success';
    resultEl.textContent = '✓ 비밀번호가 성공적으로 변경됐습니다!';
    btn.textContent = '변경 완료';
    btn.style.background = '#22C55E';
    // 2초 후 마이페이지로 이동
    setTimeout(function(){ window.location.href = 'mypage.html'; }, 2000);
  }
}

function showFieldError(field, msg) {
  var inputId = field === 'current' ? 'current-pw' : field + '-pw';
  var msgId   = field + '-msg';
  document.getElementById(inputId).className = 'error';
  var el = document.getElementById(msgId);
  el.className = 'field-msg show error';
  el.textContent = msg;
}
</script>
</body>
</html>
