<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>클래스 상세 — 직장인</title>
<style>
  :root{
    --bg:#0B1120; --surface:#141d31; --surface2:#1b2740; --line:rgba(255,255,255,.09);
    --text:#fff; --dim:rgba(255,255,255,.60); --dim2:rgba(255,255,255,.38);
    --blue:#005BFF; --accent2:#5B9DFF; --navy:#0B1120;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:var(--bg); color:var(--text);
    font-family:'Pretendard Variable','Pretendard','Noto Sans KR','Malgun Gothic',sans-serif; -webkit-font-smoothing:antialiased; }
  body{ padding-bottom:80px; }
  a{ text-decoration:none; color:inherit; }
  img{ max-width:100%; }

  /* 헤더 */
  header{ position:sticky; top:0; z-index:50; background:rgba(11,17,32,.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .hd-in{ max-width:1120px; margin:0 auto; height:58px; display:flex; align-items:center; gap:18px; padding:0 20px; }
  .logo-text{ font-size:21px; font-weight:900; letter-spacing:-1px; color:#fff; }
  .logo-text .logo-blue{ color:var(--accent2); }
  .hd-nav{ margin-left:auto; display:flex; align-items:center; gap:6px; }
  .hd-link{ color:rgba(255,255,255,.7); font-size:14px; font-weight:600; padding:7px 13px; border-radius:7px; }
  .hd-link:hover{ color:#fff; background:rgba(255,255,255,.08); }
  .hd-link.cta{ background:var(--blue); color:#fff; } .hd-link.cta:hover{ background:#0048cc; }

  /* 히어로 */
  .hero{ text-align:center; padding:52px 22px 44px; background-size:cover; background-position:center; }
  .hero.has-bg{ padding:88px 22px 74px; }
  .hero-badge{ display:inline-block; font-size:12px; font-weight:800; letter-spacing:.4px; color:var(--accent2);
    background:rgba(0,91,255,.16); border:1px solid rgba(0,91,255,.36); padding:6px 14px; border-radius:100px; margin-bottom:16px; }
  .hero-title{ font-size:30px; font-weight:900; line-height:1.3; letter-spacing:-1px; word-break:keep-all; }
  .hero-title .ac{ color:var(--accent2); }
  .hero-sub{ margin-top:13px; font-size:15.5px; color:var(--dim); line-height:1.65; word-break:keep-all; }

  /* 공통 섹션 */
  .sec{ padding:50px 22px; border-top:1px solid var(--line); }
  .sec-in{ max-width:720px; margin:0 auto; text-align:center; }
  .sec-label{ color:var(--accent2); font-size:12px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:13px; }
  .sec-title{ font-size:25px; font-weight:900; color:#fff; line-height:1.4; letter-spacing:-.5px; word-break:keep-all; }
  .sec-title .ac{ color:var(--accent2); }
  .sec-body{ margin-top:16px; color:var(--dim); font-size:15.5px; line-height:1.82; word-break:keep-all; }
  .sec-body p{ margin:9px 0; }
  .sec-img{ margin-top:24px; border-radius:16px; overflow:hidden; }
  .sec-img img{ width:100%; display:block; }

  /* stat */
  .stat-g{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:28px; }
  .stat{ min-width:150px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:22px 18px; }
  .stat .n{ font-size:38px; font-weight:900; color:#fff; line-height:1; letter-spacing:-1px; }
  .stat .c{ color:var(--dim2); font-size:13px; margin-top:9px; }

  /* cards (강점/지원/경로 공용) */
  .card-g{ display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-top:26px; text-align:left; }
  .cardx{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:20px 18px; }
  .cardx .num{ color:var(--accent2); font-weight:900; font-size:13px; letter-spacing:1px; }
  .cardx .t{ color:#fff; font-weight:800; font-size:16.5px; margin:7px 0 7px; line-height:1.35; }
  .cardx .d{ color:var(--dim); font-size:14px; line-height:1.68; word-break:keep-all; }
  .cardx ul{ margin:8px 0 0; padding-left:16px; } .cardx li{ color:var(--dim); font-size:13.5px; margin:5px 0; }

  /* checklist */
  .chk{ max-width:540px; margin:24px auto 0; text-align:left; }
  .chk .row{ display:flex; gap:11px; align-items:flex-start; color:#e8edf6; font-size:15.5px; padding:11px 0; border-bottom:1px solid var(--line); word-break:keep-all; }
  .chk .ck{ color:var(--accent2); font-weight:900; flex:0 0 auto; }
  .chk-close{ margin-top:20px; color:var(--dim); font-size:15px; line-height:1.75; }

  /* compare */
  .cmp{ display:grid; grid-template-columns:1fr 1fr; gap:0 12px; margin-top:26px; text-align:center; }
  .cmp-h{ font-weight:800; font-size:15px; padding:12px; border-radius:12px 12px 0 0; }
  .cmp-h.l{ background:#2a3346; color:var(--dim); } .cmp-h.r{ background:var(--blue); color:#fff; }
  .cmp .cell{ background:var(--surface); border:1px solid var(--line); border-top:0; padding:13px 12px; font-size:14px; color:#e8edf6; min-height:48px; display:flex; align-items:center; justify-content:center; word-break:keep-all; }
  .cmp .cell.l{ color:var(--dim2); }

  /* steps */
  .step-g{ margin-top:26px; text-align:left; }
  .stepx{ display:flex; gap:15px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:12px; }
  .stepx .idx{ flex:0 0 auto; width:38px; height:38px; border-radius:10px; background:rgba(0,91,255,.16); color:var(--accent2); font-weight:900; display:flex; align-items:center; justify-content:center; font-size:15px; }
  .stepx .t{ color:#fff; font-weight:800; font-size:16px; }
  .stepx .d{ color:var(--dim); font-size:14px; line-height:1.65; margin-top:5px; word-break:keep-all; }
  .stepx .meta{ color:var(--accent2); font-size:12.5px; font-weight:700; margin-top:7px; }

  /* photos */
  .ph-g{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:24px; }
  .ph-g img{ width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:12px; display:block; }

  /* quote */
  .q{ background:var(--surface); border-left:3px solid var(--blue); border-radius:0 12px 12px 0; padding:16px 18px; text-align:left; margin:12px 0; }
  .q .tx{ color:#e8edf6; font-size:15.5px; line-height:1.7; word-break:keep-all; }
  .q .au{ color:var(--dim2); font-size:13px; margin-top:9px; }

  /* faq */
  .faq-i{ text-align:left; border-bottom:1px solid var(--line); padding:15px 2px; }
  .faq-q{ color:#fff; font-weight:700; font-size:15.5px; }
  .faq-q:before{ content:'Q '; color:var(--accent2); font-weight:900; }
  .faq-a{ color:var(--dim); margin-top:9px; line-height:1.72; font-size:14.5px; word-break:keep-all; }

  /* text(자유 본문) */
  .rt{ margin-top:16px; color:var(--dim); font-size:15.5px; line-height:1.82; text-align:left; }
  .rt p{ margin:10px 0; } .rt strong{ color:#fff; }

  /* cta 섹션 */
  .cta-sec .sec-title{ margin-bottom:6px; }

  .empty{ padding:80px 22px; text-align:center; color:var(--dim2); }

  /* 하단 고정 CTA */
  .cta-bar{ position:fixed; left:0; right:0; bottom:0; z-index:60; background:rgba(11,17,32,.94); backdrop-filter:blur(8px); border-top:1px solid var(--line); }
  .cta-in{ max-width:720px; margin:0 auto; display:flex; gap:10px; padding:12px 16px; }
  .cta-btn{ height:50px; display:flex; align-items:center; justify-content:center; gap:7px; font-size:15px; font-weight:800; border-radius:12px; }
  .cta-kakao{ flex:1; background:#FEE500; color:#191600; }
  .cta-phone{ flex:0 0 auto; padding:0 18px; background:var(--surface2); color:#fff; border:1px solid var(--line); }
  .cta-apply{ flex:1.3; background:var(--blue); color:#fff; }

  footer{ padding:34px 22px 40px; border-top:1px solid var(--line); }
  .ft-in{ max-width:1120px; margin:0 auto; }
  .ft-logo{ font-size:19px; font-weight:900; color:#fff; margin-bottom:8px; } .ft-logo .logo-blue{ color:var(--accent2); }
  .ft-copy{ font-size:12.5px; line-height:1.7; color:var(--dim2); }

  @media (max-width:560px){
    .card-g, .cmp, .ph-g{ grid-template-columns:1fr; }
    .cmp{ gap:0; } .cmp-h.r{ border-radius:0; }
    .sec-title, .hero-title{ font-size:22px; }
    .stat .n{ font-size:32px; }
    .hd-link:not(.cta){ display:none; }
    .cta-phone span{ display:none; }
  }
</style>
</head>
<body>

<header>
  <div class="hd-in">
    <a href="index.html" class="logo-text"><span class="logo-blue">직</span>장인</a>
    <nav class="hd-nav">
      <a href="index.html" class="hd-link">홈</a>
      <a href="classes.html" class="hd-link">직장인 클래스</a>
      <a href="#apply" class="hd-link cta">수강 신청</a>
    </nav>
  </div>
</header>

<div class="hero" id="hero" style="display:none;">
  <div class="hero-badge" id="heroBadge" style="display:none;"></div>
  <h1 class="hero-title" id="heroTitle"></h1>
  <p class="hero-sub" id="heroSub" style="display:none;"></p>
</div>

<div id="blocks"><div class="empty">불러오는 중이에요…</div></div>

<div class="cta-bar" id="apply">
  <div class="cta-in">
    <a class="cta-btn cta-kakao" href="#" id="ctaKakao">💬 카카오 문의</a>
    <a class="cta-btn cta-phone" href="tel:18660379">📞 <span>1866-0379</span></a>
    <a class="cta-btn cta-apply" href="#" id="ctaApply">수강 신청하기</a>
  </div>
</div>

<footer>
  <div class="ft-in">
    <div class="ft-logo"><span class="logo-blue">직</span>장인</div>
    <div class="ft-copy">월급 말고, 내 기술로 직접 버는 삶.<br>서울특별시 가산디지털2로 143 이번워크2 · 대표: 임채인 · 1866-0379<br>© 2025 직장인. All rights reserved.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL='https://fgllsqgzgshneforfkoy.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnbGxzcWd6Z3NobmVmb3Jma295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjU3NTMsImV4cCI6MjA5NTM0MTc1M30.aBaEUieQCiih3J0uv79TdhFU2cv2UWbeNZ7C9xvs54g';
function qp(k){ return new URLSearchParams(location.search).get(k); }

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
/* {중괄호} → 강조색 */
function hl(s){ return esc(s).replace(/\{([^}]*)\}/g,'<span class="ac">$1</span>'); }
/* 여러 줄 → 문단 */
function paras(s){ if(!s) return ''; return String(s).split(/\n+/).filter(function(x){return x.trim();}).map(function(x){return '<p>'+hl(x)+'</p>';}).join(''); }
function headHTML(label,title){
  var h='';
  if(label) h+='<div class="sec-label">'+esc(label)+'</div>';
  if(title) h+='<div class="sec-title">'+hl(title)+'</div>';
  return h;
}

var BUILDERS = {
  intro:function(b){
    var h=headHTML(b.label,b.title);
    if(b.body) h+='<div class="sec-body">'+paras(b.body)+'</div>';
    if(b.image) h+='<div class="sec-img"><img src="'+esc(b.image)+'" alt=""></div>';
    return h;
  },
  text:function(b){
    var h=headHTML(b.label,b.title);
    if(b.body) h+='<div class="rt">'+paras(b.body)+'</div>';
    return h;
  },
  stat:function(b){
    var h=headHTML(b.label,b.title);
    if(b.body) h+='<div class="sec-body">'+paras(b.body)+'</div>';
    var st=(b.stats||[]).filter(function(s){return s.n||s.c;});
    if(st.length){ h+='<div class="stat-g">'+st.map(function(s){return '<div class="stat"><div class="n">'+esc(s.n)+'</div><div class="c">'+esc(s.c)+'</div></div>';}).join('')+'</div>'; }
    return h;
  },
  cards:function(b){
    var h=headHTML(b.label,b.title);
    if(b.body) h+='<div class="sec-body">'+paras(b.body)+'</div>';
    var cs=(b.cards||[]).filter(function(c){return c.title||c.desc;});
    if(cs.length){ h+='<div class="card-g">'+cs.map(function(c,i){
      var s='<div class="cardx">';
      if(b.numbered) s+='<div class="num">'+('0'+(i+1)).slice(-2)+'</div>';
      if(c.title) s+='<div class="t">'+hl(c.title)+'</div>';
      if(c.desc) s+='<div class="d">'+hl(c.desc).replace(/\n/g,'<br>')+'</div>';
      return s+'</div>';
    }).join('')+'</div>'; }
    return h;
  },
  checklist:function(b){
    var h=headHTML(b.label,b.title);
    var it=(b.items||[]).filter(Boolean);
    if(it.length){ h+='<div class="chk">'+it.map(function(x){return '<div class="row"><span class="ck">✓</span><span>'+hl(x)+'</span></div>';}).join('')+'</div>'; }
    if(b.closing) h+='<div class="chk-close">'+paras(b.closing)+'</div>';
    return h;
  },
  compare:function(b){
    var h=headHTML(b.label,b.title);
    var rows=(b.rows||[]).filter(function(r){return r.l||r.r;});
    if(rows.length){
      h+='<div class="cmp"><div class="cmp-h l">'+esc(b.leftTitle||'기존')+'</div><div class="cmp-h r">'+esc(b.rightTitle||'우리')+'</div>';
      rows.forEach(function(r){ h+='<div class="cell l">'+hl(r.l)+'</div><div class="cell r">'+hl(r.r)+'</div>'; });
      h+='</div>';
    }
    if(b.closing) h+='<div class="chk-close">'+paras(b.closing)+'</div>';
    return h;
  },
  steps:function(b){
    var h=headHTML(b.label,b.title);
    if(b.body) h+='<div class="sec-body">'+paras(b.body)+'</div>';
    var st=(b.steps||[]).filter(function(s){return s.title||s.desc;});
    if(st.length){ h+='<div class="step-g">'+st.map(function(s,i){
      var x='<div class="stepx"><div class="idx">'+('0'+(i+1)).slice(-2)+'</div><div>';
      if(s.title) x+='<div class="t">'+hl(s.title)+'</div>';
      if(s.desc) x+='<div class="d">'+hl(s.desc)+'</div>';
      if(s.meta) x+='<div class="meta">'+esc(s.meta)+'</div>';
      return x+'</div></div>';
    }).join('')+'</div>'; }
    return h;
  },
  photos:function(b){
    var h=headHTML(b.label,b.title);
    var im=(b.images||[]).filter(Boolean);
    if(im.length){ h+='<div class="ph-g">'+im.map(function(u){return '<img src="'+esc(u)+'" alt="">';}).join('')+'</div>'; }
    return h;
  },
  quote:function(b){
    var h=headHTML(b.label,b.title);
    var qs=(b.quotes||[]).filter(function(q){return q.text;});
    if(qs.length){ h+=qs.map(function(q){return '<div class="q"><div class="tx">'+hl(q.text)+'</div>'+(q.author?'<div class="au">— '+esc(q.author)+'</div>':'')+'</div>';}).join(''); }
    return h;
  },
  faq:function(b){
    var h=headHTML(b.label,b.title);
    var it=(b.items||[]).filter(function(x){return x.q;});
    if(it.length){ h+=it.map(function(x){return '<div class="faq-i"><div class="faq-q">'+esc(x.q)+'</div>'+(x.a?'<div class="faq-a">'+hl(x.a)+'</div>':'')+'</div>';}).join(''); }
    return h;
  },
  cta:function(b){
    var h=headHTML(b.label,b.title);
    if(b.body) h+='<div class="sec-body">'+paras(b.body)+'</div>';
    return h;
  }
};

function renderBlocks(blocks){
  var wrap=document.getElementById('blocks');
  if(!blocks || !blocks.length){ wrap.innerHTML='<div class="empty">아직 등록된 상세 내용이 없습니다.</div>'; return; }
  var html='';
  blocks.forEach(function(b){
    var fn=BUILDERS[b.t]; if(!fn) return;
    var inner=fn(b);
    if(!inner || !inner.trim()) return;               // 빈 블록 자동 숨김
    var cls='sec'+(b.t==='cta'?' cta-sec':'');
    html+='<section class="'+cls+'"><div class="sec-in">'+inner+'</div></section>';
  });
  wrap.innerHTML = html || '<div class="empty">아직 등록된 상세 내용이 없습니다.</div>';
}

function renderHero(page){
  var hero=document.getElementById('hero');
  if(page.hero_url){
    var safe=String(page.hero_url).replace(/["'\\]/g,'');
    hero.classList.add('has-bg');
    hero.style.backgroundImage="linear-gradient(rgba(6,10,20,.55),rgba(6,10,20,.74)),url('"+safe+"')";
  }
  if(page.title){ document.getElementById('heroTitle').innerHTML=hl(page.title); document.title=page.title+' — 직장인'; }
  if(page.subtitle){ var s=document.getElementById('heroSub'); s.textContent=page.subtitle; s.style.display='block'; }
  if(page.badge){ var bd=document.getElementById('heroBadge'); bd.textContent=page.badge; bd.style.display='inline-block'; }
  hero.style.display=(page.title||page.subtitle||page.badge||page.hero_url)?'block':'none';
}

function parseBlocks(page){
  if(page.blocks){
    if(typeof page.blocks==='string'){ try{ return JSON.parse(page.blocks); }catch(e){ return []; } }
    if(Array.isArray(page.blocks)) return page.blocks;
  }
  return null;
}

async function load(){
  var slug=qp('slug');
  var apply=document.getElementById('ctaApply');
  apply.href='apply.html'+(slug?('?slug='+encodeURIComponent(slug)):'');
  if(!slug){ renderBlocks(null); return; }
  try{
    var sb=window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    var r=await sb.from('course_pages').select('*').eq('slug',slug).limit(1).maybeSingle();
    if(r.error) throw r.error;
    var page=r.data||{};
    renderHero(page);
    document.getElementById('ctaKakao').href=page.kakao_url||'http://pf.kakao.com/';
    var blocks=parseBlocks(page);
    if(blocks){ renderBlocks(blocks); }
    else if(page.html){                                 // 예전 자유편집(HTML) 폴백
      document.getElementById('blocks').innerHTML='<section class="sec"><div class="sec-in"><div class="rt">'+page.html+'</div></div></section>';
    } else { renderBlocks(null); }
  }catch(e){
    console.error(e);
    document.getElementById('blocks').innerHTML='<div class="empty">상세 내용을 불러오지 못했어요.</div>';
  }
}
load();
</script>
</body>
</html>
