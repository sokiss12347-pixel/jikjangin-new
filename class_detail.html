<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>클래스 상세 — 직장인</title>
<style>
  :root{
    --navy:#0B1120; --navy2:#111a2e; --blue:#005BFF; --blue-dark:#0048cc;
    --ink:#1E293B; --ink2:#334155; --dim:#64748B; --line:#E7ECF3; --bg:#F5F7FB; --white:#fff;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:var(--bg); color:var(--ink); font-family:'Pretendard Variable','Pretendard','Noto Sans KR','Malgun Gothic',sans-serif; -webkit-font-smoothing:antialiased; }
  a{ text-decoration:none; color:inherit; }
  img{ max-width:100%; }

  /* ===== 헤더 ===== */
  header{ position:sticky; top:0; z-index:50; background:var(--navy); border-bottom:1px solid rgba(255,255,255,.06); }
  .hd-in{ max-width:1120px; margin:0 auto; height:58px; display:flex; align-items:center; gap:18px; padding:0 20px; }
  .logo-text{ font-size:21px; font-weight:900; letter-spacing:-1px; color:#fff; }
  .logo-text .logo-blue{ color:var(--blue); }
  .hd-nav{ margin-left:auto; display:flex; align-items:center; gap:6px; }
  .hd-link{ color:rgba(255,255,255,.78); font-size:14px; font-weight:600; padding:7px 13px; border-radius:7px; }
  .hd-link:hover{ color:#fff; background:rgba(255,255,255,.08); }
  .hd-link.cta{ background:var(--blue); color:#fff; }
  .hd-link.cta:hover{ background:var(--blue-dark); }

  /* ===== 아티클 래퍼 ===== */
  main{ max-width:820px; margin:0 auto; padding:0 0 120px; }
  .art-head{ background:var(--navy); color:#fff; padding:40px 24px 34px; text-align:center; }
  .art-badge{ display:inline-block; font-size:12px; font-weight:800; letter-spacing:.4px; color:#7FB0FF;
    background:rgba(0,91,255,.16); border:1px solid rgba(0,91,255,.34); padding:6px 14px; border-radius:100px; margin-bottom:14px; }
  .art-title{ font-size:30px; font-weight:900; line-height:1.28; letter-spacing:-1px; word-break:keep-all; }
  .art-sub{ margin-top:12px; font-size:15px; color:rgba(255,255,255,.66); line-height:1.6; word-break:keep-all; }

  .art-card{ background:#fff; margin:0 16px; margin-top:-20px; border-radius:18px; box-shadow:0 18px 44px rgba(15,23,42,.10); overflow:hidden; }

  /* ===== 자유 편집 본문 (.prose) — 강사가 뭘 써도 톤 통일 ===== */
  .prose{ padding:34px 30px 40px; font-size:16.5px; line-height:1.82; color:var(--ink2); word-break:keep-all; }
  .prose > *:first-child{ margin-top:0 !important; }
  .prose h1{ font-size:26px; font-weight:900; color:var(--ink); line-height:1.32; letter-spacing:-.6px; margin:38px 0 14px; word-break:keep-all; }
  .prose h2{ font-size:22px; font-weight:800; color:var(--ink); line-height:1.36; letter-spacing:-.5px; margin:34px 0 12px; padding-top:6px; word-break:keep-all; }
  .prose h3{ font-size:18.5px; font-weight:800; color:var(--ink); line-height:1.4; margin:26px 0 10px; word-break:keep-all; }
  .prose h2::after{ content:''; display:block; width:34px; height:3px; background:var(--blue); border-radius:3px; margin-top:9px; }
  .prose p{ margin:14px 0; }
  .prose strong{ font-weight:800; color:var(--ink); }
  .prose em{ font-style:normal; background:linear-gradient(transparent 62%, #cfe0ff 62%); padding:0 2px; }
  .prose a{ color:var(--blue); font-weight:700; text-decoration:underline; text-underline-offset:2px; }
  .prose ul,.prose ol{ margin:14px 0; padding-left:22px; }
  .prose li{ margin:7px 0; }
  .prose ul li::marker{ color:var(--blue); }
  .prose img{ display:block; width:100%; height:auto; border-radius:14px; margin:22px 0; box-shadow:0 6px 20px rgba(15,23,42,.10); }
  .prose figure{ margin:22px 0; }
  .prose figure img{ margin:0; }
  .prose figcaption{ text-align:center; font-size:13px; color:var(--dim); margin-top:9px; }
  .prose blockquote{ margin:20px 0; padding:14px 18px; background:#F3F7FF; border-left:4px solid var(--blue);
    border-radius:0 10px 10px 0; color:var(--ink2); font-size:16px; }
  .prose blockquote p{ margin:4px 0; }
  .prose hr{ border:0; border-top:1px solid var(--line); margin:30px 0; }
  .prose table{ width:100%; border-collapse:collapse; margin:20px 0; font-size:15px; }
  .prose th,.prose td{ border:1px solid var(--line); padding:10px 12px; text-align:left; }
  .prose th{ background:#F1F5FB; font-weight:800; color:var(--ink); }
  /* 두 장 나란히(편집기에서 이미지 2개를 한 문단에 넣는 경우 대응) */
  .prose p:has(> img + img){ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .prose p:has(> img + img) img{ margin:0; }

  .art-empty{ padding:70px 24px; text-align:center; color:var(--dim); font-size:15px; }

  /* ===== 하단 고정 CTA ===== */
  .cta-bar{ position:fixed; left:0; right:0; bottom:0; z-index:60; background:rgba(255,255,255,.96);
    backdrop-filter:blur(8px); border-top:1px solid var(--line); box-shadow:0 -6px 24px rgba(15,23,42,.08); }
  .cta-in{ max-width:820px; margin:0 auto; display:flex; gap:10px; padding:12px 16px; }
  .cta-btn{ height:50px; display:flex; align-items:center; justify-content:center; gap:7px; font-size:15px; font-weight:800; border-radius:12px; }
  .cta-kakao{ flex:1; background:#FEE500; color:#191600; }
  .cta-phone{ flex:0 0 auto; padding:0 18px; background:#F1F5FB; color:var(--ink); border:1px solid var(--line); }
  .cta-apply{ flex:1.3; background:var(--blue); color:#fff; box-shadow:0 8px 20px rgba(0,91,255,.3); }
  .cta-apply:hover{ background:var(--blue-dark); }

  /* ===== 푸터 ===== */
  footer{ background:var(--navy); color:rgba(255,255,255,.55); padding:34px 24px 40px; }
  .ft-in{ max-width:1120px; margin:0 auto; }
  .ft-logo{ font-size:19px; font-weight:900; color:#fff; margin-bottom:8px; }
  .ft-logo .logo-blue{ color:var(--blue); }
  .ft-copy{ font-size:12.5px; line-height:1.7; }

  @media (max-width:640px){
    .art-card{ margin:0 10px; margin-top:-18px; border-radius:15px; }
    .prose{ padding:26px 18px 32px; font-size:16px; }
    .prose h1{ font-size:22px; } .prose h2{ font-size:19.5px; } .prose h3{ font-size:17px; }
    .art-title{ font-size:24px; } .art-head{ padding:32px 18px 30px; }
    .hd-link:not(.cta){ display:none; }
    .cta-phone span{ display:none; }
  }
</style>
</head>
<body>

<header>
  <div class="hd-in">
    <a href="index.html" class="logo-text"><span class="logo-blue">직</span>장인</a>
    <nav class="hd-nav">
      <a href="index.html" class="hd-link">홈</a>
      <a href="classes.html" class="hd-link">직장인 클래스</a>
      <a href="#apply" class="hd-link cta">수강 신청</a>
    </nav>
  </div>
</header>

<main>
  <div class="art-head" id="artHead" style="display:none;">
    <div class="art-badge" id="artBadge">🔥 현재 기수 모집 중</div>
    <h1 class="art-title" id="artTitle">클래스</h1>
    <p class="art-sub" id="artSub" style="display:none;"></p>
  </div>

  <div class="art-card">
    <article class="prose" id="article">
      <div class="art-empty">불러오는 중이에요…</div>
    </article>
  </div>
</main>

<div class="cta-bar" id="apply">
  <div class="cta-in">
    <a class="cta-btn cta-kakao" href="#" id="ctaKakao">💬 카카오 문의</a>
    <a class="cta-btn cta-phone" href="tel:18660379">📞 <span>1866-0379</span></a>
    <a class="cta-btn cta-apply" href="#" id="ctaApply">수강 신청하기</a>
  </div>
</div>

<footer>
  <div class="ft-in">
    <div class="ft-logo"><span class="logo-blue">직</span>장인</div>
    <div class="ft-copy">
      월급 말고, 내 기술로 직접 버는 삶.<br>
      서울특별시 가산디지털2로 143 이번워크2 · 대표: 임채인 · 1866-0379<br>
      © 2025 직장인. All rights reserved.
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
var SUPABASE_URL = 'https://fgllsqgzgshneforfkoy.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnbGxzcWd6Z3NobmVmb3Jma295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjU3NTMsImV4cCI6MjA5NTM0MTc1M30.aBaEUieQCiih3J0uv79TdhFU2cv2UWbeNZ7C9xvs54g';

function qp(k){ return new URLSearchParams(location.search).get(k); }

/* 아티클 렌더: 정화(sanitize) 후 삽입 */
function renderArticle(page){
  var elArt = document.getElementById('article');
  if(!page || !page.html){
    elArt.innerHTML = '<div class="art-empty">아직 등록된 상세 내용이 없습니다.<br>관리자 페이지에서 상세페이지를 작성해 주세요.</div>';
    return;
  }
  // 헤더(제목/뱃지)
  if(page.title){
    document.getElementById('artTitle').textContent = page.title;
    document.title = page.title + ' — 직장인';
  }
  if(page.subtitle){
    var s=document.getElementById('artSub'); s.textContent=page.subtitle; s.style.display='block';
  }
  if(page.badge){ document.getElementById('artBadge').textContent = page.badge; }
  document.getElementById('artHead').style.display = (page.title||page.subtitle) ? 'block' : 'none';

  var clean = window.DOMPurify
    ? DOMPurify.sanitize(page.html, { ADD_ATTR:['target','rel'] })
    : page.html;
  elArt.innerHTML = clean;

  // 링크 새 탭 안전 처리
  elArt.querySelectorAll('a[target="_blank"]').forEach(function(a){ a.setAttribute('rel','noopener noreferrer'); });

  // CTA 연결(신청 페이지가 있으면 slug 전달)
  var slug = qp('slug') || '';
  var apply = document.getElementById('ctaApply');
  apply.setAttribute('href', 'apply.html' + (slug ? ('?slug='+encodeURIComponent(slug)) : ''));
  document.getElementById('ctaKakao').setAttribute('href', page.kakao_url || 'http://pf.kakao.com/');
}

async function load(){
  var slug = qp('slug');
  if(!slug){
    renderArticle(null);
    return;
  }
  try{
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    var r = await sb.from('course_pages').select('*').eq('slug', slug).limit(1).maybeSingle();
    if(r.error) throw r.error;
    renderArticle(r.data);
  }catch(e){
    console.error(e);
    document.getElementById('article').innerHTML =
      '<div class="art-empty">상세 내용을 불러오지 못했어요. 잠시 후 다시 시도해 주세요.</div>';
  }
}
load();
</script>
</body>
</html>
